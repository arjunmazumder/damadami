openapi: 3.0.3
info:
  title: Authentication API
  version: 1.0.0
  description: Production-style JWT Authentication API
paths:
  /auth/getRefreshToken:
    post:
      operationId: auth_getRefreshToken_create
      description: Get a new access token using the refresh token cookie
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          description: ''
  /auth/login:
    post:
      operationId: auth_login_create
      description: Login to get access token and refresh token cookie
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /auth/logout:
    post:
      operationId: auth_logout_create
      description: Logout and clear the refresh token cookie
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: ''
components:
  schemas:
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - access_token
      - user
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
      required:
      - access_token
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        is_active:
          type: boolean
        is_staff:
          type: boolean
      required:
      - email
      - id
